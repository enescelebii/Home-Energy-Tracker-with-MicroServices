spring.application.name=alert-service
server.port=8084

# Actuator Configuration for Prometheus
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=when_authorized
management.metrics.tags.application=${spring.application.name}


# kafka consumer
spring.kafka.consumer.bootstrap-servers=localhost:9094
spring.kafka.consumer.group-id=alert-service
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
# Use Spring's JsonDeserializer so incoming JSON payloads are converted to POJOs
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.type.mapping=alertingEvent:com.vena.kafka.event.AlertingEvent

# MySql Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3307/home_energy_tracker
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update

# mail pit configuration
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false


device.service.url=http://localhost:8081/api/v1/devices
user.service.url=http://localhost:8080/api/v1/user
